name: Deploy relay
on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Build & push docker image to GAR
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        id: docker-build-push
        with:
          team: delta
          pull: true
          docker_context: nginx-relay/
          image_suffix: relay
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: prod-gcp
          RESOURCE: nginx-relay/nais.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.image }}
