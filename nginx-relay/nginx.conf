worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Use /tmp for all temp files since chainguard runs as non-root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;

        # MS Graph subscription validation: GET /webhook/calendar?validationToken=...
        # MS Graph change notifications: POST /webhook/calendar
        location = /webhook/calendar {
            # Reject any method other than GET and POST
            limit_except GET POST {
                deny all;
            }

            proxy_pass http://delta-backend/webhook/calendar;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # MS Graph requires a response within 10s for notifications.
            # Keep timeouts tight so we fail fast rather than hanging.
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    15s;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
